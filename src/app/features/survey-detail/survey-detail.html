<div class="main_content_wrapper align-start body-color">
    <header>
        <img src="/assets/images/logo_purple_dark.png" alt="Logo">
        <app-button [primary]="true" [text]="'Create survey'"></app-button>
    </header>
    <div class="survey-detail-shell">
        
        <section class="survey-detail-container">
            <div class="survey-detail-header">
                <p class="survey-detail-header__state">Draft</p>
                <div class="survey-detail-header__expiry-date-category-container">
                    <p class="survey-detail-header__expiry-date">Survey Expiry Date</p>
                    <p class="survey-detail-header__category">Survey Category</p>
                </div>
                <h1 class="survey-detail-header__title">Survey Title</h1>
                <article class="survey-detail-header__description">Survey Description</article>
            </div>
            <div class="survey-detail-body">
                
            </div>
        </section>
        <section class="survey-results-container">
            
        </section>
    </div>
</div>
