<div class="dialog-background">
    <div class="dialog-container">
        <header class="dialog-container-header">
            <p class="dialog-container-header__state">Draft</p>
            <div class="dialog-container-header__headline-cancel-button-container">
                <h2 class="dialog-container-header__title">Create a new survey</h2>
                <app-button [buttonType]="'secondary'" [cancelNewSurvey]="true" [text]="'Cancel'" [hideIcon]="false"></app-button>
            </div>
        </header>
        <form class="dialog-container-form">
            <div class="form-detail-container">
                <div class="form-detail-container--title-date-container">
                    <label for="survey-title" class="dialog-container-form__label">Survey name</label>
                    <div class="form-detail-container__input-container">
                        <input id="survey-title" type="text" class="dialog-container-form__input">
                        <div class="form-detail-container__icon-container">
                            <img src="/assets/icons/delete-icon-default.png" class="form-detail-container__icon-container--icon-default" alt="delete icon">
                            <img src="/assets/icons/delete-icon-hover.png" class="form-detail-container__icon-container--icon-hover" alt="delete hover icon">
                        </div>
                    </div>
                    <div class="form-detail-container--date-category-container">
                        <div class="form-detail-container--date-container">
                            <label for="survey-expiry-date" class="dialog-container-form__label">Survey end date <span class="dialog-container-form__label--optional">(optional)</span></label>
                            <div class="form-detail-container__input-container">
                                <input id="survey-expiry-date" type="date" class="dialog-container-form__input">
                                <div class="form-detail-container__icon-container">
                                    <img src="/assets/icons/delete-icon-default.png" class="form-detail-container__icon-container--icon-default" alt="delete icon">
                                    <img src="/assets/icons/delete-icon-hover.png" class="form-detail-container__icon-container--icon-hover" alt="delete hover icon">
                                </div>
                            </div>
                        </div>
                        <app-category-menu [text]="'Choose category'"></app-category-menu>
                    </div>   
                </div>
                 <div class="form-detail-container--description-container">
                     <label for="survey-description" class="dialog-container-form__label">Describing text <span class="dialog-container-form__label--optional">(optional)</span></label>
                     <div class="form-detail-container__input-container form-detail-container__input-container--description">
                         <textarea id="survey-description" class="dialog-container-form__input dialog-container-form__input--textarea"></textarea>
                         <div class="form-detail-container__icon-container">
                            <img src="/assets/icons/delete-icon-default.png" class="form-detail-container__icon-container--icon-default" alt="delete icon">
                            <img src="/assets/icons/delete-icon-hover.png" class="form-detail-container__icon-container--icon-hover" alt="delete hover icon">
                        </div>
                     </div>
                </div>
            </div>
            <div class="dialog-container-form__question-container">
                <app-dialog-question-option-block></app-dialog-question-option-block>
            </div>
        </form>
        <footer class="dialog-container-footer">
            <app-button [buttonType]="'primary'" [text]="'Publish'" [publishNewSurvey]="true" [hideIcon]="false"></app-button>
        </footer>
    </div>
</div>
