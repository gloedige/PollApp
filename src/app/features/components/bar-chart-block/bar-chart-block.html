<div class="bar-chart-block-container">
    <span class="bar-chart-block-container__order-letter">{{order_letter()}}</span>
    <div class="bar-chart-bg">
        <div class="bar-chart-bg__fill" [style.width.%]="percentageOfVotes()"></div>
    </div>
    <div class="bar-chart-block-container__info">
        <p>{{percentageOfVotes().toFixed(0)}}%</p>
    </div>
</div>
