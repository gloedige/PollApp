<div class="question-result-block-container">
    <h4 class="question-result-block-container__title">{{ numberOfQuestion() }}.</h4>
    <div class="question-result-block-container__header-content">
        <h4 class="question-result-block-container__title">{{ questionText() }}</h4>
    </div>
    <div class="question-result-block-container__options">
        @for (item of questionOptions(); track $index) {
            <app-bar-chart-block [order_letter]="order_letter()[$index]" [optionId]="item.id"></app-bar-chart-block>
        }
    </div>
</div>
