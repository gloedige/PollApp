<div class="question-option-container" (click)="onOptionsSelected()">
    <app-ui-checkbox [optionId]="optionId()" [checked]="isSelected()" (toggle)="onCheckboxToggle($event)"></app-ui-checkbox>
    <span class="question-option-container__order-letter">{{order_letter()}}.</span>
    <label class="question-option-container__label" for="{{optionId()}}">{{ optionText() }}</label>
</div>
