<div class="main_content_wrapper">
    <header>
        <img src="/assets/images/logo_orange.png" alt="Logo">
    </header>
    <section class="hero-section">
        <div class="headline-container">
            <h1 class="h1__hero">Collect Feedback,<br>Unlock Ideas</h1>
            <p class="headline-container__hero-description">Create and share surveys in minutes – from team events to workplace culture. Collect opinions, engage your audience, and turn feedback into action.</p>
            <app-button [primary]="true" [text]="'New survey'"></app-button>
        </div>
        <div class="hero-img-container">
            <img src="/assets/images/hero_img_default.png" alt="hero image" class="hero-img-container__default-img">
            <img src="/assets/images/hero_img_hover.png" alt="hero image hover" class="hero-img-container__hover-img">
        </div>
    </section>
    <section class="ending-soon-section">
        <h2 class="ending-soon-section__title">Your surveys</h2>
        <p class="ending-soon-section__description">Ending soon surveys</p>
        @if (endingSoonSurvey(); as survey) {
        <app-survey-card [survey]="survey" listType="ending_soon" [showsEndingSoon]="true"></app-survey-card>
        } @else {
        <p>No surveys ending soon.</p>
        }
    </section>
</div>
